<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">
                        
            <select  id="c-type" data-rule="required" class="form-control selectpicker" name="row[type]">
                {foreach name="typeList" item="vo"}
                    <option value="{$key}" {in name="key" value=""}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Category_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-category_id" min="0" data-rule="required" data-source="asset/categories/selectpage" class="form-control selectpage" name="row[category_id]" type="text" value="">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Name')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-name" data-rule="required" class="form-control" name="row[name]" type="text">
        </div>
    </div>
    <div class="form-group">
        <label for="c-cover_url" class="control-label col-xs-12 col-sm-2">{:__('Cover_url')}:</label>
        <div class="col-xs-12 col-sm-8">
            <div class="input-group">
                <input id="c-cover_url" data-rule="" class="form-control" size="50" name="row[cover_url]" type="text">
                <div class="input-group-addon no-border no-padding">
                    <span><button type="button" id="faupload-cover_url" class="btn btn-danger faupload" data-input-id="c-cover_url" data-mimetype="image/gif,image/jpeg,image/png,image/jpg,image/bmp" data-multiple="false" data-preview-id="p-cover_url"><i class="fa fa-upload"></i> {:__('Upload')}</button></span>
                    <span><button type="button" id="fachoose-cover_url" class="btn btn-primary fachoose" data-input-id="c-cover_url" data-mimetype="image/*" data-multiple="false"><i class="fa fa-list"></i> {:__('Choose')}</button></span>
                </div>
                <span class="msg-box n-right" for="c-cover_url"></span>
            </div>
            <ul class="row list-inline faupload-preview" id="p-cover_url"></ul>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Notes')}:</label>
        <div class="col-xs-12 col-sm-8">
            <textarea id="c-notes" class="form-control " rows="5" name="row[notes]" cols="50"></textarea>
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Plan_settings')}:</label>
        <div class="col-xs-12 col-sm-8">
            <label class="radio-inline">
                <input id="c-plan-has_plan" name="row[plan][has_plan]" type="checkbox" value="1" {if condition="$planRow.has_plan"}checked{/if}> {:__('Enable_plan_settings')}
            </label>
        </div>
    </div>
    <div class="form-group" data-plan-field="type">
        <label class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-plan-type" class="form-control selectpicker" name="row[plan][type]">
                {foreach name="planTypeList" item="vo"}
                    <option value="{$key}" {if condition="$planRow.type == $key"}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group" data-plan-field="currency">
        <label class="control-label col-xs-12 col-sm-2">{:__('Currency')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-plan-currency" class="form-control selectpicker" name="row[plan][currency]">
                {foreach name="currencyList" item="vo"}
                    <option value="{$vo}" {if condition="$planRow.currency == $vo"}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group" data-plan-field="one_time_price">
        <label class="control-label col-xs-12 col-sm-2">{:__('One_time_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-one_time_price" class="form-control" step="0.01" name="row[plan][one_time_price]" type="number" value="{$planRow.one_time_price|htmlentities}">
        </div>
    </div>
    <div class="form-group" data-plan-field="purchase_date">
        <label class="control-label col-xs-12 col-sm-2">{:__('Purchase_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-purchase_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[plan][purchase_date]" type="text" value="{$planRow.purchase_date}">
        </div>
    </div>
    <div class="form-group" data-plan-field="recurring_price">
        <label class="control-label col-xs-12 col-sm-2">{:__('Recurring_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-recurring_price" class="form-control" step="0.01" name="row[plan][recurring_price]" type="number" value="{$planRow.recurring_price|htmlentities}">
        </div>
    </div>
    <div class="form-group" data-plan-field="billing_cycle">
        <label class="control-label col-xs-12 col-sm-2">{:__('Billing_cycle')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-plan-billing_cycle" class="form-control selectpicker" name="row[plan][billing_cycle]">
                {foreach name="billingCycleList" item="vo"}
                    <option value="{$key}" {if condition="$planRow.billing_cycle == $key"}selected{/if}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group" data-plan-field="billing_day">
        <label class="control-label col-xs-12 col-sm-2">{:__('Billing_day')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-billing_day" class="form-control" name="row[plan][billing_day]" type="number" value="{$planRow.billing_day|htmlentities}">
        </div>
    </div>
    <div class="form-group" data-plan-field="start_date">
        <label class="control-label col-xs-12 col-sm-2">{:__('Start_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-start_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[plan][start_date]" type="text" value="{$planRow.start_date}">
        </div>
    </div>
    <div class="form-group" data-plan-field="end_date">
        <label class="control-label col-xs-12 col-sm-2">{:__('End_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-end_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[plan][end_date]" type="text" value="{$planRow.end_date}">
        </div>
    </div>
    <div class="form-group" data-plan-field="default_payment_method_id">
        <label class="control-label col-xs-12 col-sm-2">{:__('Default_payment_method_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan-default_payment_method_id" min="0" data-source="asset/paymentmethods/selectpage" data-field="name" data-primary-key="id" class="form-control selectpage" name="row[plan][default_payment_method_id]" type="text" value="{$planRow.default_payment_method_id|htmlentities}">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
