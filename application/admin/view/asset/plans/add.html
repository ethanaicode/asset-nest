<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Item_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-item_id" data-rule="required" min="0" data-source="asset/items/selectpage" data-field="name" data-primary-key="id" class="form-control selectpage" name="row[item_id]" type="text" value="">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Type')}:</label>
        <div class="col-xs-12 col-sm-8">
                        
            <select  id="c-type" data-rule="required" class="form-control selectpicker" name="row[type]">
                {foreach name="typeList" item="vo"}
                    <option value="{$key}" {in name="key" value=""}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Currency')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-currency" data-rule="required" class="form-control selectpicker" name="row[currency]">
                {foreach name="currencyList" item="vo"}
                    <option value="{$vo}" {in name="vo" value="CNY"}selected{/in}>{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group" data-plan-field="one_time_price">
        <label class="control-label col-xs-12 col-sm-2">{:__('One_time_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-one_time_price" class="form-control" step="0.01" name="row[one_time_price]" type="number">
        </div>
    </div>
    <div class="form-group" data-plan-field="purchase_date">
        <label class="control-label col-xs-12 col-sm-2">{:__('Purchase_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-purchase_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[purchase_date]" type="text" value="{:date('Y-m-d')}">
        </div>
    </div>
    <div class="form-group" data-plan-field="recurring_price">
        <label class="control-label col-xs-12 col-sm-2">{:__('Recurring_price')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-recurring_price" class="form-control" step="0.01" name="row[recurring_price]" type="number">
        </div>
    </div>
    <div class="form-group" data-plan-field="billing_cycle">
        <label class="control-label col-xs-12 col-sm-2">{:__('Billing_cycle')}:</label>
        <div class="col-xs-12 col-sm-8">
                        
            <select  id="c-billing_cycle" class="form-control selectpicker" name="row[billing_cycle]">
                {foreach name="billingCycleList" item="vo"}
                    <option value="{$key}" {in name="key" value=""}selected{/in}>{$vo}</option>
                {/foreach}
            </select>

        </div>
    </div>
    <div class="form-group" data-plan-field="billing_day">
        <label class="control-label col-xs-12 col-sm-2">{:__('Billing_day')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-billing_day" class="form-control" name="row[billing_day]" type="number">
        </div>
    </div>
    <div class="form-group" data-plan-field="start_date">
        <label class="control-label col-xs-12 col-sm-2">{:__('Start_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-start_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[start_date]" type="text" value="{:date('Y-m-d')}">
        </div>
    </div>
    <div class="form-group" data-plan-field="end_date">
        <label class="control-label col-xs-12 col-sm-2">{:__('End_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-end_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[end_date]" type="text" value="{:date('Y-m-d')}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Default_payment_method_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <select id="c-default_payment_method_id" data-rule="required" class="form-control selectpicker" name="row[default_payment_method_id]">
                {foreach name="paymentMethodList" item="vo" key="key"}
                    <option value="{$key}">{$vo}</option>
                {/foreach}
            </select>
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
